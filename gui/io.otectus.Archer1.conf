<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root can own the Archer service -->
  <policy user="root">
    <allow own="io.otectus.Archer1"/>
  </policy>

  <!-- Any user can call methods and receive signals -->
  <policy context="default">
    <allow send_destination="io.otectus.Archer1"/>
    <allow receive_sender="io.otectus.Archer1"/>
  </policy>
</busconfig>
